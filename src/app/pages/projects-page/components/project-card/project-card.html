<div class="project-card">
  <div class="project-card__slider">
    <div class="project-card__slider-container">
      <div
        class="project-card__slider-container__track"
        [style.transform]="'translateX(-' + currentImageIndex * 100 + '%)'"
      >
        @for (image of project.images; track image) {
          <img
            class="project-card__slider-container__track-image"
            [src]="image"
            alt="Project screenshot"
          />
        }
      </div>
    </div>
    <button
      class="project-card__slider-btn project-card__slider-btn__prev"
      aria-label="Previous image"
      (click)="prevImage()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="m15 18-6-6 6-6" />
      </svg>
    </button>
    <button
      class="project-card__slider-btn project-card__slider-btn__next"
      aria-label="Next image"
      (click)="nextImage()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="m9 18 6-6-6-6" />
      </svg>
    </button>
  </div>

  <div class="project-card__content">
    <h3 class="project-card__content-title">{{ project.name }}</h3>
    <p class="project-card__content-description" [innerHTML]="project.description"></p>

    <div class="project-card__content-skills">
      @for (skill of project.skills; track skill) {
        <span class="project-card__content-skills__item">{{ skill }}</span>
      }
    </div>

    <div class="project-card__content-links">
      @if (project.liveDemoLink) {
        <a [href]="project.liveDemoLink" target="_blank" class="btn btn-small btn-primary"
          >Live Demo</a
        >
      }

      @if (project.githubLink) {
        <a [href]="project.githubLink" target="_blank" class="btn btn-small btn-secondary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
            />
            <path d="M9 18c-4.51 2-5-2-7-2" />
          </svg>
          Github
        </a>
      }

      @if (project.appStoreLink) {
        <a [href]="project.appStoreLink" target="_blank" class="btn btn-small btn-secondary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
            />
          </svg>
          App Store
        </a>
      }

      @if (project.playStoreLink) {
        <a [href]="project" target="_blank" class="btn btn-small btn-secondary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <path d="M12 18h.01" />
          </svg>
          Play Store
        </a>
      }
    </div>
  </div>
</div>
